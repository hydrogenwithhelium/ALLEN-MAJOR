<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALLEN MAJOR CBT</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }h1 {
  padding: 20px;
  margin: 0;
  background: #111;
  color: #fff;
  letter-spacing: 2px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  padding: 30px;
  max-width: 900px;
  margin: auto;
}

.tile {
  background: #fff;
  padding: 30px 10px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s ease;
  font-weight: bold;
}

.tile:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}

.test {
  background: #111;
  color: #fff;
}

  </style>
</head>
<body>  <h1>ALLEN MAJOR CBT</h1>  <div class="container">
    <a href="https://allenmajor1.vercel.app/" target="_blank" style="text-decoration:none; color:inherit;"><div class="tile">Allen Major 1</div></a>
    <div class="tile">Allen Major 2</div>
    <div class="tile">Allen Major 3</div>
    <div class="tile">Allen Major 4</div>
    <div class="tile">Allen Major 5</div>
    <div class="tile">Allen Major 6</div>
    <div class="tile">Allen Major 7</div>
    <div class="tile test">Take Test</div>
  </div></body>
</html>
