<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ALLEN MAJOR CBT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #1a1f36;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
      background: #eef3ff;
    }

    .card a {
      text-decoration: none;
      color: #1a1f36;
      font-weight: bold;
      font-size: 18px;
    }

    .coming {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: gray;
    }

    .telegram {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0088cc;
      border-radius: 50%;
      width: 55px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .telegram:hover {
      transform: scale(1.1);
    }

    .telegram img {
      width: 28px;
    }
  </style>
</head>

<body>

<header>ALLEN MAJOR CBT</header>
